services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    container_name: smartcontainer-backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - MODEL_PATH=/app/models/risk_model.joblib
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - smartcontainer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: smartcontainer-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - smartcontainer-network

  nginx:
    image: nginx:alpine
    container_name: smartcontainer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - smartcontainer-network

networks:
  smartcontainer-network:
    driver: bridge

volumes:
  models_volume:
  data_volume:
